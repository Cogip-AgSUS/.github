name: Policy for creation of repository

on:
  workflow_dispatch:
    inputs:
      projeto:
        description: "Nome do projeto"
        required: true
        type: string

      visibility:
        description: "Visibilidade do repositório"
        required: true
        default: "private"
        type: choice
        options:
          - private
          - public

      descricao:
        description: "Descrição do repositório"
        required: false
        type: string
        
permissions: {}

jobs:
  create-repository:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Cogip-AgSUS
          
      - name: Normalize names
        id: normalize
        run: |
          PROJETO=$(echo "${{ github.event.inputs.projeto }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/ /-/g' \
            | sed 's/[^a-z0-9-]//g')

          REPO_NAME="COGIP_${PROJETO}"
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT

      - name: Validate repository name and existence
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG_NAME: Cogip-AgSUS
        run: |
          REPO_NAME="${{ steps.normalize.outputs.repo_name }}"
          REGEX="^COGIP_[a-z0-9-]+$"

          # 1. Validação de Formato (Regex)
          if [[ ! "$REPO_NAME" =~ $REGEX ]]; then
            echo "❌ Erro: Nome inválido no padrão Regex: $REPO_NAME"
            exit 1
          fi

          # 2. Validação de Existência (Se o comando 'gh repo view' der certo, significa que o repo JÁ EXISTE)
          echo "Verificando disponibilidade do nome..."
          if gh repo view "$ORG_NAME/$REPO_NAME" > /dev/null 2>&1; then
            echo "Erro: O repositório '$ORG_NAME/$REPO_NAME' já existe nesta organização!"
            exit 1
          else
            echo "Nome '$REPO_NAME' está disponível para criação!"
          fi
          
      - name: Create repository
        id: create-repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG_NAME: Cogip-AgSUS
        run: |
          REPO_NAME="${{ steps.normalize.outputs.repo_name }}"

          gh repo create "$ORG_NAME/$REPO_NAME" \
            --${{ github.event.inputs.visibility }} \
            --description "${{ github.event.inputs.descricao || 'Sem descrição' }}" \
            --add-readme

      - name: Inject Commit Policies
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG_NAME: Cogip-AgSUS
          LOCAL_HOOK: |
            #!/bin/sh
            COMMIT_MSG_FILE=$1
            COMMIT_MSG=$(cat "$COMMIT_MSG_FILE")
            CONVENTIONAL_COMMIT_REGEX='^(feat|fix|docs|style|refactor|test|chore|build|ci|perf|revert)(\([a-zA-Z0-9_.-]+\))?(!)?:\s.*$'

            FAILED=0
            
            if ! echo "$COMMIT_MSG" | grep -Eq "$CONVENTIONAL_COMMIT_REGEX"; then
                echo "A mensagem de commit não segue o formato padrão."
                FAILED=1
            fi
            if [ $FAILED -ne 0 ]; then
              exit 1
            fi
            exit 0
        run: |
          REPO_NAME="${{ steps.normalize.outputs.repo_name }}"
          
          mkdir -p .githooks
          echo "$LOCAL_HOOK" > .githooks/commit-msg

          CONTENT_LOCAL=$(base64 .githooks/commit-msg | tr -d '\n')
          gh api -X PUT /repos/$ORG_NAME/$REPO_NAME/contents/.githooks/commit-msg \
            -f message="chore: add local git hook configuration" -f content="$CONTENT_LOCAL" -f branch="main"

          gh api -X GET /repos/$ORG_NAME/$REPO_NAME/contents/README.md -q '.content' | base64 -d > README.md
          echo -e "\n\n## 🛠️ Ativação das travas de Commit\nApós clonar o repositório, execute o comando abaixo no seu terminal para ativar a validação automática de commits:\n\`\`\`bash\ngit config core.hooksPath .githooks && chmod +x .githooks/commit-msg\n\`\`\`" >> README.md
          CONTENT_README=$(base64 README.md | tr -d '\n')

          SHA=$(gh api /repos/$ORG_NAME/$REPO_NAME/contents/README.md -q '.sha')
          gh api -X PUT /repos/$ORG_NAME/$REPO_NAME/contents/README.md \
            -f message="docs: update readme with hook instructions" -f content="$CONTENT_README" -f branch="main" -f sha="$SHA"

      - name: Inject Issue Templates
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG_NAME: Cogip-AgSUS

          BUG_TEMPLATE: |
            ---
            name: "Relato de Bug"
            description: "Crie um relatório para nos ajudar a identificar e corrigir um problema."
            title: "[BUG]: "
            labels: ["bug", "triage"]
            ---

            Uma descrição clara e concisa do que é o problema.
            
            Passos para reproduzir o comportamento:
            1. Vá para '...'
            2. Clique em '....'
            3. Role a página até '...'
            4. Veja o erro
            
            Uma descrição clara do que você esperava que acontecesse.
            
            Se aplicável, adicione prints de tela ou cole os logs do erro aqui.

          FEATURE_TEMPLATE: |
            ---
            name: "Nova Funcionalidade"
            description: "Sugira uma ideia ou melhoria para este projeto."
            title: "[FEATURE]: "
            labels: ["enhancement"]
            ---
            
            Uma descrição clara e concisa de qual é o problema (ex: Preciso que o sistema faça...)
            
            Uma descrição clara e concisa do que você quer que aconteça.
            
            Uma descrição clara e concisa de quaisquer soluções ou recursos alternativos que você considerou.
            
            Adicione qualquer outro contexto ou prints sobre a sugestão de recurso aqui.

        run: |
          REPO_NAME="${{ steps.normalize.outputs.repo_name }}"
          
          mkdir -p .github/ISSUE_TEMPLATE
          
          echo "$BUG_TEMPLATE" > .github/ISSUE_TEMPLATE/bug_report.md
          CONTENT_BUG=$(base64 .github/ISSUE_TEMPLATE/bug_report.md | tr -d '\n')
          
          gh api -X PUT /repos/$ORG_NAME/$REPO_NAME/contents/.github/ISSUE_TEMPLATE/bug_report.md \
            -f message="chore: add bug report issue template" \
            -f content="$CONTENT_BUG" \
            -f branch="main"

          echo "$FEATURE_TEMPLATE" > .github/ISSUE_TEMPLATE/feature_request.md
          CONTENT_FEATURE=$(base64 .github/ISSUE_TEMPLATE/feature_request.md | tr -d '\n')
          
          gh api -X PUT /repos/$ORG_NAME/$REPO_NAME/contents/.github/ISSUE_TEMPLATE/feature_request.md \
            -f message="chore: add feature request issue template" \
            -f content="$CONTENT_FEATURE" \
            -f branch="main"
            
      - name: Create Ruleset
        if: ${{ github.event.inputs.visibility == 'public' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG_NAME: Cogip-AgSUS
        run: |
          REPO_NAME="${{ steps.normalize.outputs.repo_name }}"

          cat > ruleset.json <<EOF
          {
            "name": "Protect Default Branch",
            "target": "branch",
            "enforcement": "active",
            "conditions": {
              "ref_name": {
                "include": ["~DEFAULT_BRANCH"],
                "exclude": []
              }
            },
            "rules": [
              { "type": "deletion" },
              { "type": "non_fast_forward" },
              {
                "type": "pull_request",
                "parameters": {
                  "required_approving_review_count": 1,
                  "dismiss_stale_reviews_on_push": true,
                  "require_code_owner_review": false,
                  "require_last_push_approval": false,
                  "required_review_thread_resolution": true
                }
              },
              { "type": "required_linear_history" }
            ],
            "bypass_actors": []
          }
          EOF

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/$ORG_NAME/$REPO_NAME/rulesets \
            --input ruleset.json

      - name: Rollback - Delete repository on failure
        if: ${{ failure() && steps.create-repo.conclusion == 'success' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG_NAME: Cogip-AgSUS
        run: |
          REPO_NAME="${{ steps.normalize.outputs.repo_name }}"
          echo "Erro detectado em uma das etapas essenciais pós-criação."
          echo "Deletando o repositório '$ORG_NAME/$REPO_NAME' para evitar um estado incompleto/inconsistente..."
          gh repo delete "$ORG_NAME/$REPO_NAME" --yes

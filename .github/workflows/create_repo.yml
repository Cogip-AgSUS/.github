name: Policy for creation of repository

on:
  workflow_dispatch:
    inputs:
      projeto:
        description: "Nome do projeto"
        required: true
        type: string

      visibility:
        description: "Visibilidade do repositório"
        required: true
        default: "private"
        type: choice
        options:
          - private
          - public
          - internal

      descricao:
        description: "Descrição do repositório"
        required: false
        type: string

jobs:
  create-repository:
    runs-on: ubuntu-latest

    steps:
      # 🧼 Normaliza nome
      - name: Normalize names
        id: normalize
        run: |
          PROJETO=$(echo "${{ github.event.inputs.projeto }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/ /-/g' \
            | sed 's/[^a-z0-9-]//g')

          REPO_NAME="COGIP_${PROJETO}"
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT

      # 🧪 valida nome
      - name: Validate repository name
        run: |
          REPO_NAME="${{ steps.normalize.outputs.repo_name }}"
          REGEX="^COGIP_[a-z0-9-]+$"

          if [[ ! "$REPO_NAME" =~ $REGEX ]]; then
            echo "❌ Nome inválido: $REPO_NAME"
            exit 1
          fi

      # 🔐 Token 1: Criado no escopo global da Organização para a criação do repo
      - name: Generate GitHub App token for creation
        id: app-token-create
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Cogip-AgSUS

      # 🏗️ cria repo
      - name: Create repository
        env:
          GH_TOKEN: ${{ steps.app-token-create.outputs.token }}
          ORG_NAME: Cogip-AgSUS
        run: |
          REPO_NAME="${{ steps.normalize.outputs.repo_name }}"

          gh repo create "$ORG_NAME/$REPO_NAME" \
            --${{ github.event.inputs.visibility }} \
            --description "${{ github.event.inputs.descricao || 'Sem descrição' }}" \
            --add-readme

      # ⏳ espera propagação
      - name: Wait repo availability
        env:
          GH_TOKEN: ${{ steps.app-token-create.outputs.token }}
          ORG_NAME: Cogip-AgSUS
        run: |
          REPO_NAME="${{ steps.normalize.outputs.repo_name }}"

          for i in 1 2 3 4 5; do
            gh api "/repos/$ORG_NAME/$REPO_NAME" && break
            echo "aguardando repo..."
            sleep 3
          done

      # 🔐 Token 2: Força a quebra de cache e foca estritamente no novo repo
      - name: Generate GitHub App token for workflow push
        id: app-token-write
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Cogip-AgSUS
          repositories: ${{ steps.normalize.outputs.repo_name }}

      # 📄 Prepara os arquivos de Políticas (Local e Nuvem)
      - name: Inject Commit Policies (Local Hooks & GitHub Actions)
        env:
          GH_TOKEN: ${{ steps.app-token-write.outputs.token }}
          ORG_NAME: Cogip-AgSUS
          
          # 1. CONTEÚDO DO GITHUB ACTIONS (Checagem na Nuvem)
          CLOUD_WORKFLOW: |
            name: Commit Policy (Cloud)
            on:
              push:
                branches: [ "**" ]
              pull_request:
                branches: [ "**" ]
            jobs:
              validate:
                runs-on: ubuntu-latest
                steps:
                  - uses: actions/checkout@v4
                    with:
                      fetch-depth: 0
                  - name: Validate Commit Messages
                    run: |
                      CONVENTIONAL_COMMIT_REGEX='^(feat|fix|docs|style|refactor|test|chore|build|ci|perf|revert)(\([a-zA-Z0-9_.-]+\))?(!)?:\s.*$'
                      if [ "${{ '${{ github.event_name }}' }}" = "pull_request" ]; then
                        git fetch origin ${{ '${{ github.event.pull_request.base.ref }}' }} --depth=1000
                        COMMITS=$(git log --format=%s origin/${{ '${{ github.event.pull_request.base.ref }}' }}..HEAD)
                      else
                        if [ "${{ '${{ github.event.before }}' }}" = "0000000000000000000000000000000000000000" ]; then
                          COMMITS=$(git log -1 --format=%s)
                        else
                          COMMITS=$(git log --format=%s ${{ '${{ github.event.before }}' }}..${{ '${{ github.event.after }}' }})
                        fi
                      fi
                      if [ -z "$COMMITS" ]; then exit 0; fi
                      while read -r COMMIT_MSG; do
                        if [ -z "$COMMIT_MSG" ]; then continue; fi
                        if ! [[ "$COMMIT_MSG" =~ $CONVENTIONAL_COMMIT_REGEX ]]; then
                          echo "❌ ERRO: Mensagem fora do padrão convencional: \"$COMMIT_MSG\""
                          exit 1
                        fi
                      done <<< "$COMMITS"

          # 2. CONTEÚDO DO SEU SCRIPT (Checagem Local no Terminal)
          LOCAL_HOOK: |
            #!/bin/sh
            COMMIT_MSG_FILE=$1
            COMMIT_MSG=$(cat "$COMMIT_MSG_FILE")
            CONVENTIONAL_COMMIT_REGEX='^(feat|fix|docs|style|refactor|test|chore|build|ci|perf|revert)(\([a-zA-Z0-9_.-]+\))?(!)?:\s.*$'

            FAILED=0
            
            if ! [[ $COMMIT_MSG =~ $CONVENTIONAL_COMMIT_REGEX ]]; then
                echo "❌ ERRO: A mensagem de commit não segue o formato padrão."
                echo "O formato correto é obrigatório: <tipo>(<escopo opcional>): <descrição>"
                echo "Tipos válidos: feat, fix, docs, style, refactor, test, chore, build, ci, perf, revert"
                FAILED=1
            fi
            if [ $FAILED -ne 0 ]; then
              echo
              echo "O formato correto da mensagem de commit é obrigatório:"
              echo "  <tipo>(<escopo opcional>): <descrição>"
              echo
              echo "Os tipos válidos são:"
              echo "  feat:     Uma nova funcionalidade."
              echo "  fix:      Correção de um bug."
              echo "  docs:     Alterações na documentação."
              echo "  style:    Alterações de estilo de código (formatação, ponto-e-vírgula ausente, etc.)."
              echo "  refactor: Refatoração de código (nem corrige bug nem adiciona funcionalidade)."
              echo "  test:     Adicionar ou atualizar testes."
              echo "  chore:    Tarefas rotineiras como atualização de dependências ou ferramentas de build."
              echo "  build:    Alterações que afetam o sistema de build ou dependências externas."
              echo "  ci:       Alterações nos arquivos de configuração de CI ou scripts."
              echo "  perf:     Melhorias de desempenho."
              echo "  revert:   Reverter um commit anterior."
              echo
              echo "Exemplos:"
              echo "  feat(auth): adicionar funcionalidade"
              echo "  fix: corrigi bug"
              echo "  docs: atualizar instruções de instalação"
              echo
              exit 1
            fi
            exit 0

        run: |
          REPO_NAME="${{ steps.normalize.outputs.repo_name }}"
          
          # Criando os arquivos temporariamente no runner
          mkdir -p .github/workflows .githooks
          echo "$CLOUD_WORKFLOW" > .github/workflows/commit-policy.yml
          echo "$LOCAL_HOOK" > .githooks/commit-msg

          # 🚀 1. Sobe o arquivo do GitHub Actions
          CONTENT_CLOUD=$(base64 .github/workflows/commit-policy.yml | tr -d '\n')
          gh api -X PUT /repos/$ORG_NAME/$REPO_NAME/contents/.github/workflows/commit-policy.yml \
            -f message="chore: add cloud commit policy" -f content="$CONTENT_CLOUD" -f branch="main"

          # 🚀 2. Sobe o seu script de trava local para a pasta .githooks/
          CONTENT_LOCAL=$(base64 .githooks/commit-msg | tr -d '\n')
          gh api -X PUT /repos/$ORG_NAME/$REPO_NAME/contents/.githooks/commit-msg \
            -f message="chore: add local git hook configuration" -f content="$CONTENT_LOCAL" -f branch="main"

          # 🚀 3. Altera o README para ensinar o desenvolvedor a ativar a trava com 1 comando
          gh api -X GET /repos/$ORG_NAME/$REPO_NAME/contents/README.md -q '.content' | base64 -d > README.md
          echo -e "\n\n## 🛠️ Ativação das travas de Commit\nApós clonar o repositório, execute o comando abaixo no seu terminal para ativar a validação automática de commits:\n\`\`\`bash\ngit config core.hooksPath .githooks && chmod +x .githooks/commit-msg\n\`\`\`" >> README.md
          CONTENT_README=$(base64 README.md | tr -d '\n')
          
          # Pega o SHA atual do README para poder atualizá-lo
          SHA=$(gh api /repos/$ORG_NAME/$REPO_NAME/contents/README.md -q '.sha')
          gh api -X PUT /repos/$ORG_NAME/$REPO_NAME/contents/README.md \
            -f message="docs: update readme with hook instructions" -f content="$CONTENT_README" -f branch="main" -f sha="$SHA"

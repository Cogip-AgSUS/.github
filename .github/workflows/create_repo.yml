name: Policy for creation of repository

on:
  workflow_dispatch:
    inputs:
      projeto:
        description: "Nome do projeto"
        required: true
        type: string

      visibility:
        description: "Visibilidade do repositório"
        required: true
        default: "private"
        type: choice
        options:
          - private
          - public
          - internal

      descricao:
        description: "Descrição do repositório"
        required: false
        type: string

jobs:
  create-repository:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Normalize names
        id: normalize
        run: |
          PROJETO=$(echo "${{ github.event.inputs.projeto }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/ /-/g' \
            | sed 's/[^a-z0-9-]//g')

          REPO_NAME="COGIP_${PROJETO}"

          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT

      - name: Validate repository name
        run: |
          REPO_NAME="${{ steps.normalize.outputs.repo_name }}"

          REGEX="^COGIP_[a-z0-9-]+$"

          if [[ ! "$REPO_NAME" =~ $REGEX ]]; then
            echo "❌ Nome inválido: $REPO_NAME"
            exit 1
          fi

          echo "✅ Nome válido"

      - name: Create repository
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG_NAME: Cogip-AgSUS
        run: |
          REPO_NAME="${{ steps.normalize.outputs.repo_name }}"
      
          gh repo create "$ORG_NAME/$REPO_NAME" \
            --${{ github.event.inputs.visibility }} \
            --description "${{ github.event.inputs.descricao || 'Sem descrição' }}" \
            --add-readme
      
      - name: Protect main branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG_NAME: Cogip-AgSUS
        run: |
          REPO_NAME="${{ steps.normalize.outputs.repo_name }}"

          gh api \
            --method PUT \
            /repos/$ORG_NAME/$REPO_NAME/branches/main/protection \
            -H "Accept: application/vnd.github+json" \
            -f required_status_checks='null' \
            -f enforce_admins=true \
            -f required_pull_request_reviews.dismiss_stale_reviews=true \
            -f required_pull_request_reviews.required_approving_review_count=1 \
            -f restrictions='null'
          
      - name: Summary
        run: |
          echo "✅ Repositório criado com sucesso"
          echo "📦 Nome: ${{ steps.normalize.outputs.repo_name }}"
